include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

# TDS needs different credentials
.container-runner-beverin:
  variables:
    F7T_CLIENT_ID: $F7T_TDS_CLIENT_ID
    F7T_CLIENT_SECRET: $F7T_TDS_CLIENT_SECRET

.container-runner-beverin-mi300:
  extends: [.container-runner-beverin-mi300, .container-runner-beverin]

.container-runner-beverin-mi200:
  extends: [.container-runner-beverin-mi200, .container-runner-beverin]
  # variables:
  #   SLURM_CPU_BIND: 'quiet,mask_cpu:ff00000000000000ff000000000000,ff00000000000000ff00000000000000,ff00000000000000ff0000,ff00000000000000ff000000,ff00000000000000ff,ff00000000000000ff00,ff00000000000000ff00000000,ff00000000000000ff0000000000'


.build_for_beverin_mi200:
  variables:
    RUNNER: ".dlaf-container-runner-beverin-mi200"
    THREADS_MAX_PER_TASK: 16
    THREADS_PER_NODE: 256

