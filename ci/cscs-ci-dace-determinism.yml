# DaCe codegen determinism check (icon4py-driven)
# ===============================================
#
# Drives an icon4py test selection through nox twice with isolated
# GT4PY_BUILD_CACHE_DIR per run, then asserts the generated source
# under each <program>/src/ is byte-identical between the two runs.
# A diff means the gt4py + dace toolchain is non-deterministic for
# that selection.
#
# The actual logic lives in:
#   ci/dace_deterministic_codegen/dace_deterministic_codegen.py   (harness)
#   ci/dace_deterministic_codegen/bootstrap_icon4py.py            (venv prep)
#   ci/dace_deterministic_codegen/run_in_ci.sh                    (CI driver)
#
# This file just wires those into GitLab CI: when to run, on which
# runners, with which selection × component matrix.
#
# Failure semantics
# -----------------
#   `allow_failure: true` while the determinism work stabilizes —
#   surface regressions on the dashboard without gating merges. Drop
#   `allow_failure` once we have a sustained green stretch on `main`.
#
# Custom dace branch
# ------------------
#   To test a dace fork/branch (e.g. unmerged determinism work), set
#   DACE_REPO and DACE_REF in the variables block below. When unset,
#   dace resolves through icon4py's existing source pin (currently the
#   GridTools/pypi published wheel). See run_in_ci.sh for the details.

stages:
  - dace-determinism

variables:
  ICON4PY_REPO: 'https://github.com/C2SM/icon4py.git'
  ICON4PY_REF: 'main'

  # Custom dace fork/branch under test. Leave both empty to resolve
  # dace through icon4py's existing source pin. Set both together to
  # install editable dace from a clone of DACE_REPO @ DACE_REF.
  # Example for the deterministic codegen branch:
  #   DACE_REPO: 'https://github.com/GridTools/dace.git'
  #   DACE_REF:  'dace_toolchain_deterministic'
  DACE_REPO: ''
  DACE_REF: ''

# Shared template for all dace-determinism jobs
.dace_determinism_common:
  stage: dace-determinism
  image: ${CSCS_REGISTRY_PATH}/public/${ARCH}/base/gt4py-ci-${PY_VERSION}:${DOCKER_TAG}
  variables:
    PY_VERSION: '3.10'
    DACE_DETERMINISM_PYTHON: '${PY_VERSION}'
    DACE_DETERMINISM_SELECTION: 'stencils'
    DACE_DETERMINISM_GRID: 'icon_regional'
    SLURM_JOB_NUM_NODES: 1
    SLURM_TIMELIMIT: 30
  # Don't block merges on determinism regressions — yet. Flip to
  # `false` once the toolchain is reliably converged.
  allow_failure: true
  artifacts:
    when: always
    paths:
      - _dace_deterministic_codegen/${DACE_DETERMINISM_BACKEND}/${DACE_DETERMINISM_COMPONENT}/
    expire_in: 1 month
  script:
    - mkdir -p "${WORKDIR}/gt4py" && git clone --depth 1 "${CSCS_CI_ORIG_CLONE_URL}" "${WORKDIR}/gt4py"
    - cd "${WORKDIR}/gt4py" && git fetch --depth 1 origin "${CI_COMMIT_SHA}" && git checkout "${CI_COMMIT_SHA}"
    # The gt4py CI Docker image already sets VIRTUAL_ENV and prepends
    # ${VIRTUAL_ENV}/bin to PATH (see ci/Dockerfile), so
    # `python`, `uv`, `nox` etc. resolve to the venv binaries without
    # sourcing activate. Matches the .test_common pattern.
    - export GT4PY_PATH="${WORKDIR}/gt4py"
    - export ICON4PY_PATH="${WORKDIR}/icon4py"
    # Custom dace branch: only set DACE_PATH if DACE_REPO is non-empty.
    # run_in_ci.sh treats DACE_PATH (along with DACE_REPO/DACE_REF) as
    # the trigger to clone + install dace editable.
    - if [ -n "${DACE_REPO}" ]; then export DACE_PATH="${WORKDIR}/dace"; fi
    # Per-cell artifact subdirectory (matches artifacts.paths above).
    - export DACE_DETERMINISM_ARTIFACT_DIR="${CI_PROJECT_DIR}/_dace_deterministic_codegen/${DACE_DETERMINISM_BACKEND}/${DACE_DETERMINISM_COMPONENT}"
    - bash "${WORKDIR}/gt4py/ci/dace_deterministic_codegen/run_in_ci.sh"

dace_determinism_cscs_gh200_cuda:
  extends:
    - .container-runner-santis-gh200
    - .dace_determinism_common
  needs:
    - job: build_cscs_gh200
      parallel:
        matrix:
          - PY_VERSION: '3.10'
  variables:
    DACE_DETERMINISM_BACKEND: 'dace_gpu'
    SLURM_GPUS_PER_NODE: 1
    SLURM_PARTITION: 'shared'
    GT4PY_BUILD_JOBS: 8
    PYTEST_XDIST_AUTO_NUM_WORKERS: 32
  parallel:
    matrix:
      - DACE_DETERMINISM_COMPONENT:
          - dycore
          - advection
          - diffusion
          - muphys

dace_determinism_cscs_gh200_cpu:
  extends:
    - .container-runner-santis-gh200
    - .dace_determinism_common
  needs:
    - job: build_cscs_gh200
      parallel:
        matrix:
          - PY_VERSION: '3.10'
  variables:
    DACE_DETERMINISM_BACKEND: 'dace_cpu'
    SLURM_PARTITION: 'shared'
    GT4PY_BUILD_JOBS: 8
    PYTEST_XDIST_AUTO_NUM_WORKERS: 32
  parallel:
    matrix:
      - DACE_DETERMINISM_COMPONENT:
          - dycore
          - advection
          - diffusion
          - muphys
