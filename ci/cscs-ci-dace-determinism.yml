# DaCe codegen determinism check
# ==============================
#
# Drives gt4py's `test_*_dace_determinism` nox sessions, each of which
# runs pytest twice with isolated GT4PY_BUILD_CACHE_DIR and asserts
# the DaCe-generated source files under <program>/src/ are
# byte-identical between the two runs.
#
# A diff means the gt4py + dace toolchain is non-deterministic for
# that test selection.
#
# Logic lives in:
#   noxfile.py                                   (test_*_dace_determinism sessions)
#   scripts/dace_deterministic_codegen.py        (cache comparison lib + CLI)
#
# This file just wires those sessions into GitLab CI: when to run, on
# which runners, and with which (session, device) cells.
#
# Failure semantics
# -----------------
#   `allow_failure: true` while the determinism work stabilizes —
#   surface regressions on the dashboard without gating merges. Drop
#   `allow_failure` once we have a sustained green stretch on `main`.
#
# Adding new matrix cells
# -----------------------
#   The (subpackage, device, meshlib) dimension uses GitLab's
#   `parallel.matrix` via NOX_SESSION. Adding cells is a one-line
#   change to the relevant matrix block.

stages:
  - dace-determinism

# Shared template for all dace-determinism jobs.
.dace_determinism_common:
  stage: dace-determinism
  image: ${CSCS_REGISTRY_PATH}/public/${ARCH}/base/gt4py-ci-${PY_VERSION}:${DOCKER_TAG}
  variables:
    PY_VERSION: '3.10'
    SLURM_JOB_NUM_NODES: 1
    SLURM_TIMELIMIT: 30
  rules:
    # Schedule + manual web trigger only. No on-push, no on-MR.
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never
  allow_failure: true
  artifacts:
    when: always
    paths:
      - _dace_deterministic_codegen/
    expire_in: 1 month
  script:
    - mkdir -p "${WORKDIR}/gt4py" && git clone --depth 1 "${CSCS_CI_ORIG_CLONE_URL}" "${WORKDIR}/gt4py"
    - cd "${WORKDIR}/gt4py" && git fetch --depth 1 origin "${CI_COMMIT_SHA}" && git checkout "${CI_COMMIT_SHA}"
    - cd "${WORKDIR}/gt4py" && ./noxfile.py -s "${NOX_SESSION}"

dace_determinism_cscs_gh200_cuda:
  extends:
    - .container-runner-santis-gh200
    - .dace_determinism_common
  needs:
    - job: build_cscs_gh200
      parallel:
        matrix:
          - PY_VERSION: '3.10'
  variables:
    SLURM_GPUS_PER_NODE: 1
    SLURM_PARTITION: 'shared'
    GT4PY_BUILD_JOBS: 8
    PYTEST_XDIST_AUTO_NUM_WORKERS: 32
  parallel:
    matrix:
      - NOX_SESSION:
          - "test_next_dace_determinism-3.10(cuda12, nomesh)"
          - "test_cartesian_dace_determinism-3.10(cuda12)"

dace_determinism_cscs_gh200_cpu:
  extends:
    - .container-runner-santis-gh200
    - .dace_determinism_common
  needs:
    - job: build_cscs_gh200
      parallel:
        matrix:
          - PY_VERSION: '3.10'
  variables:
    SLURM_PARTITION: 'shared'
    GT4PY_BUILD_JOBS: 8
    PYTEST_XDIST_AUTO_NUM_WORKERS: 32
  parallel:
    matrix:
      - NOX_SESSION:
          - "test_next_dace_determinism-3.10(cpu, nomesh)"
          - "test_cartesian_dace_determinism-3.10(cpu)"
