  - case: fieldop
    main: |
      from __future__ import annotations
      import typing
      from gt4py import next as gtx
      KDim = gtx.Dimension("KDim", kind=gtx.DimensionKind.VERTICAL)
      @gtx.field_operator
      def foo(a: gtx.Field[gtx.Dims[KDim], gtx.int32]) -> gtx.Field[gtx.Dims[KDim], gtx.int32]:
          return a
      zeros = gtx.zeros({KDim: range(10)}, dtype=gtx.int32)
      more_zeros = foo(zeros)
  - case: fieldop_sig_with_kwargs
    main: |
      from gt4py import next as gtx
      KDim = gtx.Dimension("KDim", kind=gtx.DimensionKind.VERTICAL)
      @gtx.field_operator(grid_type=None, backend=None)
      def foo(a: gtx.Field[gtx.Dims[KDim], gtx.int32]) -> gtx.Field[gtx.Dims[KDim], gtx.int32]:
          return a
