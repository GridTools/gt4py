  - case: call_where
    main: |
      from __future__ import annotations
      import typing
      from gt4py import next as gtx

      CellDim = gtx.Dimension("CellDim", kind=gtx.DimensionKind.HORIZONTAL)
      KDim = gtx.Dimension("KDim", kind=gtx.DimensionKind.VERTICAL)
      T = typing.TypeVar("T", float, gtx.float32, gtx.float64, bool, gtx.int32, gtx.int64)
      CellKField: typing.TypeAlias = gtx.Field[gtx.Dims[CellDim, KDim], T]

      def foo(
          mask: CellKField[bool], a: CellKField[gtx.float64], b: CellKField[gtx.float64]
      ) -> CellKField[gtx.float64]:
          return gtx.where(mask & (a >= gtx.float64(0.0)), b, 0.0)

  - case: call_where_tuples
    main: |
      from __future__ import annotations
      import typing
      from gt4py import next as gtx

      CellDim = gtx.Dimension("CellDim", kind=gtx.DimensionKind.HORIZONTAL)
      KDim = gtx.Dimension("KDim", kind=gtx.DimensionKind.VERTICAL)
      T = typing.TypeVar("T", float, gtx.float32, gtx.float64, bool, gtx.int32, gtx.int64)
      CellKField: typing.TypeAlias = gtx.Field[gtx.Dims[CellDim, KDim], T]
      CKTuple: typing.TypeAlias = tuple[CellKField[T], CellKField[T]]

      def foo(
          mask: CellKField[bool], a: CKTuple[gtx.float64], b: CKTuple[gtx.float64]
      ) -> CKTuple[T]:
          return gtx.where(mask, b, 0.0)
