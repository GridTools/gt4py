  - case: where_real_life
    main: |
      from __future__ import annotations
      import typing
      from gt4py import next as gtx
      from gt4py.next import where

      CellDim = gtx.Dimension("CellDim", kind=gtx.DimensionKind.HORIZONTAL)
      KDim = gtx.Dimension("KDim", kind=gtx.DimensionKind.VERTICAL)
      T = typing.TypeVar("T", float, gtx.float32, gtx.float64, bool, gtx.int32, gtx.int64)
      CellField: typing.TypeAlias = gtx.Field[gtx.Dims[CellDim], T]
      CellKField: typing.TypeAlias = gtx.Field[gtx.Dims[CellDim, KDim], T]

      @gtx.field_operator
      def _postprocess_antidiffusive_cell_fluxes_and_min_max(
          refin_ctrl: CellField[gtx.int32],
          p_cc: CellKField[gtx.float64],
          z_tracer_new_low: CellKField[gtx.float64],
          z_tracer_max: CellKField[gtx.float64],
          z_tracer_min: CellKField[gtx.float64],
          lo_bound: gtx.int32,
          hi_bound: gtx.int32,
      ) -> tuple[
          CellKField[gtx.float64],
          CellKField[gtx.float64],
          CellKField[gtx.float64],
      ]:
          condition = (refin_ctrl == lo_bound) | (refin_ctrl == hi_bound)
          z_tracer_new_out = where(
              condition,
              gtx.minimum(1.1 * p_cc, gtx.maximum(0.9 * p_cc, z_tracer_new_low)),
              z_tracer_new_low,
          )

          z_tracer_max_out = where(
              condition, gtx.astype(gtx.maximum(p_cc, z_tracer_new_out), gtx.float64), z_tracer_max
          )
          z_tracer_min_out = where(
              condition, gtx.astype(gtx.minimum(p_cc, z_tracer_new_out), gtx.float64), z_tracer_min
          )

          return (z_tracer_new_out, z_tracer_max_out, z_tracer_min_out)

